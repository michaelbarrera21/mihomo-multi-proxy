<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Proxy Manager</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f8fafc;
            --panel: rgba(255,255,255,.86);
            --border: rgba(148,163,184,.24);
            --text: #0f172a;
            --muted: #64748b;
            --primary: #6366f1;
            --error: #e11d48;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --panel: rgba(15,23,42,.82);
                --border: rgba(148,163,184,.16);
                --text: #e2e8f0;
                --muted: #94a3b8;
            }
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,.18), transparent),
                radial-gradient(ellipse 60% 40% at 80% 50%, rgba(6,182,212,.08), transparent),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 24px;
        }
        .panel {
            width: min(100%, 380px);
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--panel);
            box-shadow: 0 24px 70px rgba(15,23,42,.18);
            backdrop-filter: blur(18px) saturate(1.1);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: white;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
        }
        h1 {
            font-size: 22px;
            line-height: 1.2;
            margin: 0;
        }
        p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }
        label {
            display: block;
            margin: 14px 0 6px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,.62);
            color: var(--text);
            padding: 0 13px;
            font: inherit;
            outline: none;
        }
        @media (prefers-color-scheme: dark) {
            input { background: rgba(15,23,42,.72); }
        }
        input:focus {
            border-color: rgba(99,102,241,.64);
            box-shadow: 0 0 0 3px rgba(99,102,241,.14);
        }
        button {
            width: 100%;
            height: 42px;
            margin-top: 18px;
            border: 0;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 10px 28px rgba(99,102,241,.28);
        }
        button:disabled {
            opacity: .62;
            cursor: not-allowed;
        }
        .error {
            display: none;
            margin-top: 14px;
            color: var(--error);
            font-size: 13px;
        }
        .warning {
            display: none;
            margin-top: 14px;
            color: #b45309;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <main class="panel">
        <div class="brand">
            <div class="logo">PM</div>
            <div>
                <h1>Proxy Manager</h1>
                <p>Sign in to manage sources and ports</p>
            </div>
        </div>

        <form id="login-form">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" value="admin" required autofocus>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button id="submit" type="submit">Sign In</button>
            <div id="error" class="error">Invalid username or password.</div>
            <div id="warning" class="warning">This service is using the default admin/admin password. Change it before exposing the service.</div>
        </form>
    </main>

    <script>
        const form = document.getElementById('login-form');
        const errorBox = document.getElementById('error');
        const warningBox = document.getElementById('warning');
        const submit = document.getElementById('submit');
        function safeNext(value) {
            return value && value.startsWith('/') && !value.startsWith('//') ? value : '/';
        }

        const next = safeNext(new URLSearchParams(window.location.search).get('next'));

        fetch('/api/auth/status')
            .then(r => r.json())
            .then(data => {
                if (data.authenticated) window.location.replace(next);
                if (data.using_default_password) warningBox.style.display = 'block';
            })
            .catch(() => {});

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorBox.style.display = 'none';
            submit.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: form.username.value,
                        password: form.password.value
                    })
                });

                if (!res.ok) throw new Error('login failed');
                window.location.replace(next);
            } catch {
                errorBox.style.display = 'block';
            } finally {
                submit.disabled = false;
            }
        });
    </script>
</body>

</html>
